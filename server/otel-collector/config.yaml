receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # Scrape da zabbix-api-bridge (itens internos via API). Feito aqui no gateway
  # porque o container do Prometheus nao resolve nomes de container para scrape;
  # o collector resolve (empurra pro prometheus/loki via nome). O dado flui via
  # remote_write junto com o resto.
  prometheus:
    config:
      scrape_configs:
        - job_name: zabbix-api-bridge
          scrape_interval: 60s
          static_configs:
            - targets: ["zbx-api-bridge:9099"]

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    timeout: 10s
    send_batch_size: 1024

exporters:
  prometheusremotewrite:
    endpoint: http://zbx-prometheus:9090/api/v1/write
    # Promove atributos de recurso (zbx.node, zbx.role, host.name...) para
    # labels das metricas. Sem isso, os host metrics (system_*) nao carregam
    # o nó e colidem entre si na mesma serie.
    resource_to_telemetry_conversion:
      enabled: true
  otlphttp/loki:
    endpoint: http://zbx-loki:3100/otlp
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki]
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: '0.0.0.0'
                port: 8888
