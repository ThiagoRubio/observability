receivers:
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu:
      memory:
      disk:
      filesystem:
      network:
      load:

  # Scrape dos exporters do witness: pgpool2_exporter (:9719) e
  # pgbouncer_exporter (:9127). Ambos exigem o usuario de monitoracao
  # autorizado no pgpool (pool_hba.conf/pool_passwd) e no pgbouncer
  # (stats_users) - ver docs/deploy-hml.md.
  prometheus:
    config:
      scrape_configs:
        - job_name: pgpool
          scrape_interval: 30s
          static_configs:
            - targets: ["127.0.0.1:9719"]
        - job_name: pgbouncer
          scrape_interval: 30s
          static_configs:
            - targets: ["127.0.0.1:9127"]

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64
  batch:
    timeout: 10s
    send_batch_size: 1024
  resource:
    attributes:
      - key: zbx.role
        value: witness
        action: upsert
      - key: zbx.node
        value: __NODE_NAME__
        action: upsert

exporters:
  otlp:
    endpoint: __GATEWAY_HOST__:4317
    tls:
      insecure: true

extensions:
  health_check:
    endpoint: 127.0.0.1:13133

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [hostmetrics, prometheus]
      processors: [memory_limiter, resource, batch]
      exporters: [otlp]
  telemetry:
    logs:
      level: info
